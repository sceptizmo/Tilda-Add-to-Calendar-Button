<!--
  Tilda Add to Calendar — готовый блок для вставки в HTML-блок Тильды

  Скопируйте весь код ниже и вставьте в блок «HTML-код» в редакторе Тильды.
  Назначьте класс uc-cal-but блоку с кнопкой (Дополнительно → Класс CSS).
  Протестировано на блоке BF101 Кнопка (блок с одной кнопкой).
  Отредактируйте данные события в блоке НАСТРОЙКИ СОБЫТИЙ.

  Сайт: https://github.com/sceptizmo/Tilda-Add-to-Calendar-Button
-->
<script>
(function () {

	/* ======================================================
	   НАСТРОЙКИ СОБЫТИЙ
	   Редактируйте только этот блок.
	   Замените значения ниже на данные вашего события.
	   ====================================================== */

	var EVENT_TITLE = "Название мероприятия";
	var LOCATION = "Место проведения";  // Например: "Лиссабон, Rua Augusta 123", "Сан-Франциско, Market St 123", "Онлайн".
	var START_ISO = "2026-01-01T12:00:00+03:00";  // Формат: ГГГГ-ММ-ДДTЧЧ:ММ:СС+ЧЧ:ММ (часовой пояс).
	var END_ISO   = "2026-01-01T14:00:00+03:00";
	var DESCRIPTION = [
		"Краткое описание мероприятия.",
		"",
		"Регистрация: https://example.com/event"
	].join("\n");

	/* ======================================================
	   ПОМОЩНИКИ
	   ====================================================== */

	function pad(n) {
		return String(n).padStart(2, "0");
	}

	function toUTC(dt) {
		return dt.getUTCFullYear()
			+ pad(dt.getUTCMonth() + 1)
			+ pad(dt.getUTCDate()) + "T"
			+ pad(dt.getUTCHours())
			+ pad(dt.getUTCMinutes())
			+ pad(dt.getUTCSeconds()) + "Z";
	}

	function icsEscape(text) {
		return String(text || "")
			.replace(/\\/g, "\\\\")
			.replace(/\r\n/g, "\n")
			.replace(/\r/g, "\n")
			.replace(/\n/g, "\\n")
			.replace(/,/g, "\\,")
			.replace(/;/g, "\\;");
	}

	function isTouchDevice() {
		return (
			"ontouchstart" in window ||
			navigator.maxTouchPoints > 0 ||
			window.matchMedia("(pointer: coarse)").matches
		);
	}

	/* ======================================================
	   ПРЕДУПРЕЖДЕНИЕ ДЛЯ APPLE CALENDAR (ICS)
	   При необходимости измените текст и стиль.
	   ====================================================== */

	function showCalendarWarning() {
		if (document.getElementById("uc-cal-warning")) return;

		var overlay = document.createElement("div");
		overlay.id = "uc-cal-warning";
		overlay.style.cssText = `
			position: fixed;
			inset: 0;
			background: rgba(0,0,0,0.4);
			z-index: 1000000;
			display: flex;
			align-items: center;
			justify-content: center;
		`;

		var box = document.createElement("div");
		box.style.cssText = `
			background: #fff;
			border: 3px solid #000;
			padding: 20px 22px;
			max-width: 420px;
			font-family: Montserrat, Arial, sans-serif;
			font-size: 16px;
			line-height: 1.4;
			color: #000;
		`;

		box.innerHTML = `
			<div style="margin-bottom:16px;">
				Добавление события в календарь Apple (ICS) не поддерживается во встроенном браузере приложения.
				<br><br>
				Пожалуйста, откройте страницу в мобильном браузере Safari, Chrome или с компьютера.
			</div>
			<div style="text-align:right;">
				<button id="uc-cal-warning-close"
					style="
						background:#fff;
						border:3px solid #000;
						padding:6px 14px;
						font-family:inherit;
						font-size:15px;
						cursor:pointer;
					">
					OK
				</button>
			</div>
		`;

		overlay.appendChild(box);
		document.body.appendChild(overlay);

		document.getElementById("uc-cal-warning-close").addEventListener("click", function () {
			overlay.remove();
		});

		overlay.addEventListener("click", function (e) {
			if (e.target === overlay) overlay.remove();
		});
	}

	/* ======================================================
	   ОБЪЕКТЫ ДАТ
	   ====================================================== */

	var start = new Date(START_ISO);
	var end   = new Date(END_ISO);

	/* ======================================================
	   ССЫЛКИ НА КАЛЕНДАРИ
	   ====================================================== */

	var googleUrl =
		"https://calendar.google.com/calendar/render?action=TEMPLATE"
		+ "&text=" + encodeURIComponent(EVENT_TITLE)
		+ "&dates=" + encodeURIComponent(toUTC(start) + "/" + toUTC(end))
		+ "&details=" + encodeURIComponent(DESCRIPTION)
		+ "&location=" + encodeURIComponent(LOCATION);

	var oStart = start.toISOString();
	var oEnd   = end.toISOString();

	var outlook365Url =
		"https://outlook.office.com/calendar/0/deeplink/compose"
		+ "?subject=" + encodeURIComponent(EVENT_TITLE)
		+ "&body=" + encodeURIComponent(DESCRIPTION)
		+ "&startdt=" + encodeURIComponent(oStart)
		+ "&enddt=" + encodeURIComponent(oEnd)
		+ "&location=" + encodeURIComponent(LOCATION);

	var outlookLiveUrl =
		"https://outlook.live.com/calendar/0/deeplink/compose"
		+ "?subject=" + encodeURIComponent(EVENT_TITLE)
		+ "&body=" + encodeURIComponent(DESCRIPTION)
		+ "&startdt=" + encodeURIComponent(oStart)
		+ "&enddt=" + encodeURIComponent(oEnd)
		+ "&location=" + encodeURIComponent(LOCATION);

	/* ======================================================
	   СКАЧИВАНИЕ ICS
	   ====================================================== */

	function downloadICS() {
		var ics =
			"BEGIN:VCALENDAR\n" +
			"VERSION:2.0\n" +
			"PRODID:-//TildaAddToCalendar//EN\n" +
			"CALSCALE:GREGORIAN\n" +
			"BEGIN:VEVENT\n" +
			"UID:tilda-cal-" + Date.now() + "@local\n" +
			"DTSTAMP:" + toUTC(new Date()) + "\n" +
			"DTSTART:" + toUTC(start) + "\n" +
			"DTEND:" + toUTC(end) + "\n" +
			"SUMMARY:" + icsEscape(EVENT_TITLE) + "\n" +
			"DESCRIPTION:" + icsEscape(DESCRIPTION) + "\n" +
			"LOCATION:" + icsEscape(LOCATION) + "\n" +
			"END:VEVENT\n" +
			"END:VCALENDAR\n";

		var blob = new Blob([ics], { type: "text/calendar;charset=utf-8" });
		var url = URL.createObjectURL(blob);

		var a = document.createElement("a");
		a.href = url;
		a.download = "event.ics";
		document.body.appendChild(a);

		var fallbackTimer = null;

		if (isTouchDevice()) {
			fallbackTimer = setTimeout(showCalendarWarning, 1500);
		}

		function clearFallback() {
			if (fallbackTimer) {
				clearTimeout(fallbackTimer);
				fallbackTimer = null;
			}
			document.removeEventListener("visibilitychange", clearFallback);
			window.removeEventListener("pagehide", clearFallback);
		}

		document.addEventListener("visibilitychange", clearFallback);
		window.addEventListener("pagehide", clearFallback);

		a.click();
		a.remove();

		setTimeout(function () {
			URL.revokeObjectURL(url);
		}, 2000);
	}

	/* ======================================================
	   МЕНЮ КАЛЕНДАРЯ
	   ====================================================== */

	var menu = document.createElement("div");
	menu.id = "uc-cal-menu";
	menu.style.cssText = `
		position: absolute;
		background: #fff;
		border: 3px solid #000;
		padding: 6px 0;
		display: none;
		z-index: 9999;
		font-family: Montserrat, Arial, sans-serif;
		font-size: 16px;
	`;

	menu.innerHTML = `
		<div class="uc-cal-item" data-type="google">Google Calendar</div>
		<div class="uc-cal-item" data-type="ical">Apple / iCal</div>
		<div class="uc-cal-item" data-type="o365">Outlook 365</div>
		<div class="uc-cal-item" data-type="olive">Outlook Live</div>
	`;

	menu.querySelectorAll(".uc-cal-item").forEach(function (item) {
		item.style.cssText = `
			padding: 10px 16px;
			cursor: pointer;
			white-space: nowrap;
		`;

		item.addEventListener("mouseenter", function () {
			item.style.background = "#f0f0f0";
		});

		item.addEventListener("mouseleave", function () {
			item.style.background = "transparent";
		});

		item.addEventListener("click", function () {
			menu.style.display = "none";

			var t = item.dataset.type;

			if (t === "google") window.open(googleUrl, "_blank");
			if (t === "o365") window.open(outlook365Url, "_blank");
			if (t === "olive") window.open(outlookLiveUrl, "_blank");
			if (t === "ical") downloadICS();
		});
	});

	document.body.appendChild(menu);

	/* ======================================================
	   ОБРАБОТЧИК КЛИКА
	   Класс .uc-cal-but — назначьте его блоку с кнопкой в Тильде.
	   ====================================================== */

	document.addEventListener("click", function (e) {

		var btn = e.target.closest(".uc-cal-but");
		if (!btn) {
			if (!menu.contains(e.target)) menu.style.display = "none";
			return;
		}

		e.preventDefault();
		e.stopPropagation();

		var container = btn.querySelector(".t-container");
		if (!container) return;

		if (getComputedStyle(container).position === "static") {
			container.style.position = "relative";
		}

		if (menu.parentNode !== container) {
			container.appendChild(menu);
		}

		menu.style.display = "block";

		var buttonEl = btn.querySelector(".t-btnflex");
		if (!buttonEl) return;

		menu.style.left = buttonEl.offsetLeft + "px";
		menu.style.top  = (buttonEl.offsetTop + buttonEl.offsetHeight + 8) + "px";
	});

})();
</script>
